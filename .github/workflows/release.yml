name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, and publish DMG
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like v0.1.0; got $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "DMG_PATH=dist/Function-Keys-$VERSION.dmg" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build signed app
        env:
          CODESIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: ./scripts/build-app.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict --verbose=2 "dist/Function Keys.app"

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Notarize app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          APP_ZIP="$RUNNER_TEMP/FunctionKeys-app.zip"
          ditto -c -k --keepParent "dist/Function Keys.app" "$APP_ZIP"

          SUBMISSION_ID=$(xcrun notarytool submit "$APP_ZIP" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --output-format json | jq -r '.id')
          echo "App submission ID: $SUBMISSION_ID"

          for i in $(seq 1 24); do
            STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" \
              --output-format json | jq -r '.status')
            echo "[${i}] notarization status: $STATUS"
            if [[ "$STATUS" == "Accepted" ]]; then break; fi
            if [[ "$STATUS" == "Invalid" || "$STATUS" == "Rejected" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --key "$APPLE_API_KEY_PATH" \
                --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER_ID" /dev/stderr || true
              exit 1
            fi
            sleep 30
          done

      - name: Staple app notarization ticket
        run: xcrun stapler staple "dist/Function Keys.app"

      - name: Create DMG
        run: ./scripts/create-dmg.sh

      - name: Sign DMG
        env:
          CODESIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: codesign --sign "$CODESIGN_IDENTITY" --timestamp "$DMG_PATH"

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          SUBMISSION_ID=$(xcrun notarytool submit "$DMG_PATH" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --output-format json | jq -r '.id')
          echo "DMG submission ID: $SUBMISSION_ID"

          for i in $(seq 1 24); do
            STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" \
              --output-format json | jq -r '.status')
            echo "[${i}] notarization status: $STATUS"
            if [[ "$STATUS" == "Accepted" ]]; then break; fi
            if [[ "$STATUS" == "Invalid" || "$STATUS" == "Rejected" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --key "$APPLE_API_KEY_PATH" \
                --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER_ID" /dev/stderr || true
              exit 1
            fi
            sleep 30
          done

      - name: Staple notarization ticket
        run: xcrun stapler staple "$DMG_PATH"

      - name: Verify notarized DMG
        run: spctl --assess --type open --context context:primary-signature --verbose "$DMG_PATH"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          echo "## What's Changed" > release_notes.md
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"* %s (%h)" >> release_notes.md
          else
            git log "${PREV_TAG}..${GITHUB_REF_NAME}" --pretty=format:"* %s (%h)" >> release_notes.md
          fi
          echo "" >> release_notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          body_path: release_notes.md
          generate_release_notes: true
