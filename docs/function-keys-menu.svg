<svg width="920" height="520" viewBox="0 0 920 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Function Keys menu bar app menu</title>
  <desc id="desc">A sanitized render of the Function Keys macOS menu bar item with its menu open.</desc>
  <defs>
    <linearGradient id="menuBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74a8d1"/>
      <stop offset="1" stop-color="#36749f"/>
    </linearGradient>
    <linearGradient id="menuFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24282b"/>
      <stop offset="1" stop-color="#171a1c"/>
    </linearGradient>
    <filter id="menuShadow" x="-16%" y="-18%" width="132%" height="148%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.36"/>
    </filter>
    <style>
      .system-text {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        font-weight: 400;
        letter-spacing: 0;
      }
      .menu-text {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        font-size: 24px;
        font-weight: 400;
        letter-spacing: 0;
      }
    </style>
  </defs>

  <rect width="920" height="520" fill="#101315"/>
  <rect width="920" height="64" fill="url(#menuBar)"/>
  <rect y="64" width="920" height="456" fill="#101315"/>

  <g transform="translate(618 10)">
    <text x="48" y="26" text-anchor="middle" class="system-text" font-size="25" fill="#eef6fb">Fn</text>
  </g>

  <g transform="translate(721 19)" fill="none" stroke="#eef6fb" stroke-width="2" stroke-linejoin="round" opacity="0.96">
    <rect x="0" y="0" width="33" height="17" rx="4"/>
    <path d="M36 6v5" stroke-linecap="round"/>
    <rect x="4" y="4" width="25" height="9" rx="2" fill="#eef6fb" stroke="none"/>
  </g>
  <text x="858" y="33" text-anchor="middle" class="system-text" font-size="17" fill="#eef6fb">Mon 9:41</text>

  <g filter="url(#menuShadow)" transform="translate(150 0)">
    <rect x="171" y="72" width="578" height="330" rx="22" fill="url(#menuFill)" stroke="#575f64" stroke-width="1.3"/>

    <text x="278" y="121" class="menu-text" fill="#d8dde0">Media Keys</text>

    <rect x="187" y="153" width="546" height="52" rx="10" fill="#2f6fc5"/>
    <path d="M225 178l8 8l18 -19" fill="none" stroke="#f4f8fb" stroke-width="2.9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="278" y="188" class="menu-text" fill="#f5f8fb">F1, F2 as Standard Keys</text>

    <line x1="215" y1="224" x2="705" y2="224" stroke="#6a7278" stroke-width="1" opacity="0.48"/>

    <g transform="translate(224 252) scale(1.08)" fill="none" stroke="#d8dde0" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.2 2h-.4a2 2 0 0 0-2 2v.2a2 2 0 0 1-1 1.7l-.4.2a2 2 0 0 1-2 0l-.2-.1a2 2 0 0 0-2.7.7l-.2.4a2 2 0 0 0 .7 2.7l.2.1a2 2 0 0 1 1 1.7v.6a2 2 0 0 1-1 1.7l-.2.1a2 2 0 0 0-.7 2.7l.2.4a2 2 0 0 0 2.7.7l.2-.1a2 2 0 0 1 2 0l.4.2a2 2 0 0 1 1 1.7v.2a2 2 0 0 0 2 2h.4a2 2 0 0 0 2-2v-.2a2 2 0 0 1 1-1.7l.4-.2a2 2 0 0 1 2 0l.2.1a2 2 0 0 0 2.7-.7l.2-.4a2 2 0 0 0-.7-2.7l-.2-.1a2 2 0 0 1-1-1.7v-.6a2 2 0 0 1 1-1.7l.2-.1a2 2 0 0 0 .7-2.7l-.2-.4a2 2 0 0 0-2.7-.7l-.2.1a2 2 0 0 1-2 0l-.4-.2a2 2 0 0 1-1-1.7V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    </g>
    <text x="278" y="272" class="menu-text" fill="#d8dde0">Open Keyboard Settings</text>

    <line x1="215" y1="306" x2="705" y2="306" stroke="#6a7278" stroke-width="1" opacity="0.48"/>

    <text x="215" y="355" class="menu-text" fill="#d8dde0">Quit Function Keys</text>
    <text x="688" y="355" text-anchor="end" class="system-text" font-size="22" font-weight="400" fill="#8e969c">⌘Q</text>
  </g>
</svg>
